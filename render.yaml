services:
  # ─── 백엔드 FastAPI ───────────────────────────────────────────────────────
  - type: web
    name: greenreach-api
    runtime: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # Render 대시보드에서 직접 입력 (Supabase 연결 문자열)
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ─── 프론트엔드 React (Static Site) ──────────────────────────────────────
  - type: web
    name: greenreach-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://greenreach-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
