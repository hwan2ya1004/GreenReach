services:
  # ─── 백엔드 FastAPI ───────────────────────────────────────────────────────
  - type: web
    name: greenreach-api
    runtime: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: greenreach-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ─── 프론트엔드 React (Static Site) ──────────────────────────────────────
  - type: web
    name: greenreach-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://greenreach-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ─── PostgreSQL + PostGIS ─────────────────────────────────────────────────
  - name: greenreach-db
    databaseName: greenreach
    user: greenreach
    region: singapore
    plan: free
